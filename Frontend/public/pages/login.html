<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - VittaWear</title>

    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/auth.css">
</head>
<body>

<!-- Header -->
<header class="header">
    <div class="container">
        <div class="header-content">
            <a href="../index.html" class="logo">
                <img src="../images/logo verde.png" alt="VittaWear" class="logo-img">
            </a>
            
           <nav class="navbar" id="navbar">
    <div class="container navbar-content">
        <a href="../index.html" class="logo">
            <img src="../images/logo verde.png" alt="VittaWear" class="logo-img">
        </a>    
        
        <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Menu">
            <span class="hamburger"></span>
        </button>
        
        <ul class="nav-links" id="navLinks">
            <li><a href="../index.html">Home</a></li>
            <li><a href="produtos.html">Produtos</a></li>
            <li><a href="sobre.html">Sobre</a></li>
            <li><a href="contato.html">Contato</a></li>
        </ul>
        
        <div class="nav-actions">
            <a href="login.html" class="login-btn active">
                <span class="login-text">Entrar</span>
            </a>
        </div>
    </div>
</nav>
            <div class="header-actions">
                <a href="login.html" class="btn-icon active">
                    👤
                </a>
            </div>
        </div>
    </div>
</header>

<!-- Main -->
<main class="auth-page">
    <div class="auth-container">

        <!-- FORM -->
        <div class="auth-card">
            <div class="auth-header">
                <h1>Entrar</h1>
                <p>Acesse sua conta VittaWear</p>
            </div>
            
            <form class="auth-form" id="loginForm">

                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                    <span class="error-message" id="emailError"></span>
                </div>
                
                <div class="form-group">
                    <label for="password">Senha</label>
                    
                    <div class="password-input">
                        <input type="password" id="password" name="password" placeholder="Digite sua senha" required>

                        <button type="button" class="toggle-password" id="togglePassword">
                            👁
                        </button>
                    </div>

                    <span class="error-message" id="passwordError"></span>
                </div>

                <div class="form-options">
                    <a href="#" class="link">Esqueceu a senha?</a>
                </div>
                
                <button type="submit" class="btn btn-primary btn-full">
                    Entrar
                </button>
            </form>
            
            <div class="auth-divider">
                <span>ou entre com</span>
            </div>
            
            <div class="social-login">
                <button type="button" class="btn-social btn-google">
                    Google
                </button>
            </div>
            
            <p class="auth-footer">
                Não tem uma conta? <a href="cadastro.html">Criar conta</a>
            </p>
        </div>
        
        <!-- LADO DIREITO -->
        <div class="auth-image">
            <div class="auth-image-content">
                <h2>Bem-vindo de volta</h2>
                <p>Entre para continuar sua experiência na VittaWear</p>
            </div>
        </div>

    </div>
</main>

<script>
document.addEventListener('DOMContentLoaded', function() {

    // Mostrar/ocultar senha
    const toggle = document.getElementById('togglePassword');
    const input = document.getElementById('password');

    toggle.addEventListener('click', function() {
        const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
        input.setAttribute('type', type);
    });

    // Validação simples
    const form = document.getElementById('loginForm');

    form.addEventListener('submit', function(e) {
        e.preventDefault();

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        let isValid = true;

        if (!email) {
            document.getElementById('emailError').textContent = 'Informe o e-mail';
            isValid = false;
        } else {
            document.getElementById('emailError').textContent = '';
        }

        if (!password) {
            document.getElementById('passwordError').textContent = 'Informe a senha';
            isValid = false;
        } else {
            document.getElementById('passwordError').textContent = '';
        }

        if (isValid) {
            alert('Login realizado com sucesso!');
            window.location.href = '../index.html';
        }
    });

});
</script>

</body>
</html>
